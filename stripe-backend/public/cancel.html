<html lang="fr">

      min-height: 100vh; text-align: center; padding: 2rem;

    .icon { font-size: 4rem; margin-bottom: 1rem; }

      display: inline-block; padding: 0.75rem 1.5rem;

      text-decoration: none; font-weight: 600;
